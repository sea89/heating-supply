services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: heating_supply
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/heating_supply
      JWT_SECRET: change-this-in-production
      PORT: 3000
    ports:
      - "3001:3000"
    command: >
      sh -c "node setup.js && node src/index.js"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  pgdata:
